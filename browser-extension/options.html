<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Study Session Blocker Settings</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        color: #111827;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        max-width: 420px;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #D1D5DB;
        margin-bottom: 12px;
      }
      button {
        background: #2563EB;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
      }
      .status {
        margin-top: 12px;
        color: #2563EB;
        font-size: 14px;
      }
      .hint {
        font-size: 12px;
        color: #6B7280;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Study Session Blocker Settings</h1>
    <label for="apiBase">API Base URL</label>
    <input id="apiBase" type="text" placeholder="http://localhost:5004" />
    <button id="save">Save</button>
    <div class="status" id="status"></div>
    <div class="hint">Set this to your backend URL (for example: http://localhost:5004).</div>

    <script src="options.js"></script>
  </body>
</html>
